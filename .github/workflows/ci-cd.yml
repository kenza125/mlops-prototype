name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Installer les dependances
        run: pip install -r requirements.txt
      - name: Lancer les tests
        run: pytest

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build et Push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: kenza125/sentiment-api:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Creer un cluster kind ephemere
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: mlops-ci

      - name: Installer cert-manager
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.14.5/cert-manager.yaml
          kubectl wait --for=condition=Available --timeout=180s -n cert-manager deployment/cert-manager
          kubectl wait --for=condition=Available --timeout=180s -n cert-manager deployment/cert-manager-webhook
          kubectl wait --for=condition=Available --timeout=180s -n cert-manager deployment/cert-manager-cainjector

      - name: Installer KServe en mode RawDeployment
        run: |
          kubectl apply --server-side -f https://github.com/kserve/kserve/releases/download/v0.11.2/kserve.yaml
          sleep 15
          kubectl patch deployment kserve-controller-manager -n kserve --type='json' -p='[{"op":"replace","path":"/spec/template/spec/containers/1/image","value":"quay.io/brancz/kube-rbac-proxy:v0.15.0"}]' || echo "patch skipped, index may differ"
          kubectl patch configmap/inferenceservice-config -n kserve --type=merge -p '{"data":{"deploy":"{\"defaultDeploymentMode\": \"RawDeployment\"}"}}'
          kubectl rollout restart deployment/kserve-controller-manager -n kserve
          kubectl wait --for=condition=Available --timeout=180s -n kserve deployment/kserve-controller-manager

      - name: Deployer l'InferenceService
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: serving.kserve.io/v1beta1
          kind: InferenceService
          metadata:
            name: sentiment-api
          spec:
            predictor:
              containers:
                - name: kserve-container
                  image: kenza125/sentiment-api:latest
                  ports:
                    - containerPort: 8000
                      protocol: TCP
                  env:
                    - name: MODEL_SOURCE
                      value: pretrained
          EOF

      - name: Attendre que le pod apparaisse
        run: |
          echo "--- Attente de creation du pod (jusqu'a 2 minutes) ---"
          for i in $(seq 1 24); do
            COUNT=$(kubectl get pod -l serving.kserve.io/inferenceservice=sentiment-api --no-headers 2>/dev/null | wc -l)
            if [ "$COUNT" -gt 0 ]; then
              echo "Pod trouve apres $((i*5)) secondes"
              break
            fi
            echo "Pas encore de pod, tentative $i/24..."
            kubectl get inferenceservice sentiment-api -o yaml | grep -A5 "status:" || true
            sleep 5
          done
          kubectl get pods -A

      - name: Attendre que le pod soit pret
        run: |
          kubectl wait --for=condition=Ready --timeout=180s pod -l serving.kserve.io/inferenceservice=sentiment-api

      - name: Verifier la sante du service
        run: |
          kubectl port-forward svc/sentiment-api-predictor 8000:80 &
          sleep 5
          curl --fail http://localhost:8000/health || (kubectl logs -l serving.kserve.io/inferenceservice=sentiment-api --tail=100 && exit 1)

      - name: Afficher les logs en cas d'echec
        if: failure()
        run: |
          kubectl get pods -A
          kubectl describe inferenceservice sentiment-api
          kubectl get events --sort-by='.lastTimestamp' -A | tail -40
          kubectl logs -l serving.kserve.io/inferenceservice=sentiment-api --tail=200 || true
